{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center"
     style="min-height:80vh; background-color:#F6F8FB;">

    <div class="auth-card">

        <div class="text-center mb-4">

            <h3 class="fw-bold text-dark mb-1">
                Edit Study Plan
            </h3>

            <p class="text-muted small">
                Update your study session.
            </p>

        </div>

        <form action="{{ url_for('update_plan', id=plan.id) }}"
              method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Subject / Task
                </label>

                <input
                    type="text"
                    name="subject"
                    class="form-control"
                    value="{{ plan.subject }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Study Date
                </label>

                <input
                    type="date"
                    name="study_date"
                    class="form-control"
                    value="{{ plan.study_date }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Duration (minutes)
                </label>

                <input
                    type="number"
                    name="duration"
                    class="form-control"
                    value="{{ plan.duration }}"
                    min="5"
                    required>

            </div>

            <div class="form-check mb-4">

                <input
                    class="form-check-input"
                    type="checkbox"
                    name="completed"
                    id="completed"
                    {% if plan.completed %}checked{% endif %}>

                <label class="form-check-label" for="completed">
                    Mark as Completed
                </label>

            </div>

            <div class="d-flex gap-2">

                <a href="{{ url_for('planner') }}"
                   class="btn btn-light border w-50">

                    Cancel

                </a>

                <button
                    type="submit"
                    class="btn btn-teal w-50">

                    Update Plan

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
