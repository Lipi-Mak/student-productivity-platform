{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center"
     style="min-height:80vh; background-color:#F6F8FB;">

    <div class="auth-card">

        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark mb-1">
                Edit Goal
            </h3>

            <p class="text-muted small">
                Update your semester goal.
            </p>
        </div>

        <form action="{{ url_for('update_goal', id=goal.id) }}" method="POST">

            <div class="mb-3">
                <label class="form-label">
                    Goal Title
                </label>

                <input
                    type="text"
                    name="goal_title"
                    class="form-control"
                    value="{{ goal.goal_title }}"
                    required>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Progress (%)
                </label>

                <input
                    type="number"
                    name="progress"
                    class="form-control"
                    value="{{ goal.progress }}"
                    min="0"
                    max="100"
                    required>
            </div>

            <div class="mb-4">

                <label class="form-label">
                    Status
                </label>
            
                <select
                    name="completed"
                    class="form-select">
            
                    <option value="False"
                    {% if not goal.completed %}selected{% endif %}>
                        Pending
                    </option>
            
                    <option value="True"
                    {% if goal.completed %}selected{% endif %}>
                        Completed
                    </option>
            
                </select>
            
            </div>

            <div class="d-flex gap-2">

                <a href="{{ url_for('goals') }}"
                   class="btn btn-light w-50 border">
                    Cancel
                </a>

                <button
                    type="submit"
                    class="btn btn-teal w-50">
                    Update Goal
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
