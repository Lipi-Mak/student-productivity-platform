{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center"
     style="min-height:80vh; background:#F6F8FB;">

    <div class="auth-card">

        <div class="text-center mb-4">

            <h3 class="fw-bold">

                New Semester Goal

            </h3>

            <p class="text-muted small">

                Set a goal and monitor your progress.

            </p>

        </div>

        <form action="{{ url_for('add_goal') }}"
              method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Goal Title

                </label>

                <input
                    type="text"
                    name="goal_title"
                    class="form-control"
                    placeholder="Enter goal"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Progress (%)

                </label>

                <input
                    type="number"
                    name="progress"
                    class="form-control"
                    min="0"
                    max="100"
                    value="0"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Status

                </label>

                <select
                    name="completed"
                    class="form-select">

                    <option value="False">

                        Pending

                    </option>

                    <option value="True">

                        Completed

                    </option>

                </select>

            </div>

            <div class="d-flex gap-2">

                <a href="{{ url_for('goals') }}"
                   class="btn btn-light border w-50">

                    Cancel

                </a>

                <button
                    type="submit"
                    class="btn btn-teal w-50">

                    Save Goal

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
