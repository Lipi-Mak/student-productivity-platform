<header class="top-navbar-premium">
    <div class="premium-search-box" style="opacity: 0.7;">
        <i class="bi bi-search"></i>
        <input
            type="text"
            placeholder="Quick Search (Coming Soon)"
            disabled
            style="cursor: not-allowed; background: transparent; border: none; outline: none;">
    </div>

    <div class="d-flex align-items-center gap-3">

        <div class="position-relative p-1 text-secondary" style="cursor: pointer;">
            <i class="bi bi-bell fs-5"></i>
            <span class="position-absolute top-1 start-75 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
        </div>

        <div class="d-flex align-items-center gap-2 border-start ps-3">

            <div class="rounded-circle d-flex align-items-center justify-content-center text-white"
                style="width:34px; height:34px; background-color: #2196A3; font-weight:700; font-size:0.8rem;">
                {{ current_user.username[:1]|upper }}
            </div>

            <span class="fw-semibold text-dark fs-6 d-none d-sm-inline">
             {{ current_user.username }}
            </span>

            <a href="{{ url_for('logout') }}"
                class="btn btn-outline-danger btn-sm ms-2">
             Logout
            </a>

        </div>

    </div>
</header>
