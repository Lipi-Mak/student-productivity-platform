{% extends "base.html" %}

{% block content %}

<div class="container py-4">

    <h2 class="mb-4">Add Important Link</h2>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Website Name
            </label>

            <input
                type="text"
                name="title"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                URL
            </label>

            <input
                type="url"
                name="url"
                class="form-control"
                placeholder="https://"
                required>

        </div>

        <button class="btn btn-primary">
            Save Link
        </button>

    </form>

</div>

{% endblock %}
