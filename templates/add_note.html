{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center"
     style="min-height:80vh; background-color:#F6F8FB;">

    <div class="auth-card">

        <div class="text-center mb-4">

            <h3 class="fw-bold text-dark mb-1">
                New Note
            </h3>

            <p class="text-muted small">
                Save an important study note.
            </p>

        </div>

        <form action="{{ url_for('add_note') }}"
              method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Note Title

                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    placeholder="Enter note title"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Note Content

                </label>

                <textarea
                    name="content"
                    class="form-control"
                    rows="8"
                    placeholder="Write your notes here..."
                    required></textarea>

            </div>

            <div class="d-flex gap-2">

                <a href="{{ url_for('notes') }}"
                   class="btn btn-light border w-50">

                    Cancel

                </a>

                <button
                    type="submit"
                    class="btn btn-teal w-50">

                    Save Note

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
