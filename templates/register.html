<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Account | StudentOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">

    <div class="auth-viewport-wrapper">
        <div class="auth-saas-card">
            
            <div class="text-center mb-4">
                <div class="auth-brand-title d-flex align-items-center justify-content-center gap-2 mb-1">
                    <i class="bi bi-mortarboard-fill"></i>
                    <span>StudentOS</span>
                </div>
                <span class="badge bg-light border text-secondary rounded-pill px-3 py-1.5" style="font-size: 0.75rem; font-weight: 600; letter-spacing: 0.02em;">Student Productivity Hub</span>
            </div>

            <div class="mb-4 text-center">
                <h3 class="auth-heading-main mb-1">Create Your Account</h3>
                <p class="text-secondary small mb-0">Build your secure, modern platform tracking space.</p>
            </div>

            <form action="#" method="POST" autocomplete="off">
                
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-dark mb-1">Username</label>
                    <input type="text" class="form-control form-saas-input" placeholder="e.g. your name_last name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-dark mb-1">Email address</label>
                    <input type="email" class="form-control form-saas-input" placeholder="name@university.edu" required>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-semibold text-dark mb-1">Password</label>
                    <div class="input-password-wrapper">
                        <input type="password" class="form-control form-saas-input w-100" placeholder="••••••••" required>
                        <i class="bi bi-eye password-toggle-trigger"></i>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-semibold text-dark mb-1">Confirm Password</label>
                    <div class="input-password-wrapper">
                        <input type="password" class="form-control form-saas-input w-100" placeholder="••••••••" required>
                        <i class="bi bi-eye password-toggle-trigger"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-saas-primary w-100 mb-3">Create Account</button>

                <div class="saas-divider">OR</div>

                <button type="button" class="btn btn-saas-oauth w-100 mb-4">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.85z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.85c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span>Continue with Google</span>
                </button>

                <div class="text-center small text-secondary">
                    Already have an account? <a href="/login.html" class="auth-link-premium ms-1">Login</a>
                </div>

            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
