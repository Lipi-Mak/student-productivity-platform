<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - StudentOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #F6F8FB;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .auth-card {
            background: #ffffff;
            border: 1px solid #E7EDF3;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }
        .brand-logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2196A3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }
        .sub-badge {
            background: #ffffff;
            border: 1px solid #E7EDF3;
            color: #6B7280;
            border-radius: 20px;
            padding: 4px 16px;
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 8px;
        }
        .btn-teal {
            background-color: #2196A3;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-teal:hover {
            background-color: #1A7F8B;
            color: #ffffff;
        }
        .form-label {
            font-weight: 600;
            color: #1F2937;
            font-size: 0.9rem;
        }
        .form-control {
            border: 1px solid #D1D5DB;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 0.95rem;
            color: #1F2937;
        }
        .form-control::placeholder {
            color: #9CA3AF;
        }
        .form-control:focus {
            border-color: #2196A3;
            box-shadow: 0 0 0 3px rgba(33, 150, 163, 0.15);
        }
        .input-group-text {
            background: transparent;
            border: 1px solid #D1D5DB;
            border-left: none;
            border-radius: 0 10px 10px 0;
            color: #6B7280;
            cursor: pointer;
        }
        .has-password-icon {
            border-right: none;
            border-radius: 10px 0 0 10px;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-4">
            <a href="#" class="brand-logo">
                <i class="bi bi-mortarboard-fill"></i> StudentOS
            </a>
            <div class="sub-badge">Student Productivity Hub</div>
            <h3 class="fw-bold text-dark mt-4 mb-1" style="font-size: 1.6rem;">Create Your Account</h3>
            <p class="text-muted small">Build your secure, modern platform tracking space.</p>
        </div>

        <form action="#" method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" placeholder="e.g. khushi_shitole" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" class="form-control" placeholder="name@university.edu" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control has-password-icon" placeholder="••••••••" required>
                    <span class="input-group-text"><i class="bi bi-eye"></i></span>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Confirm Password</label>
                <div class="input-group">
                    <input type="password" class="form-control has-password-icon" placeholder="••••••••" required>
                    <span class="input-group-text"><i class="bi bi-eye"></i></span>
                </div>
            </div>
            
            <button type="submit" class="btn btn-teal w-100 py-2.5">Create Account</button>
        </form>

        <div class="text-center mt-4">
            <p class="small text-muted mb-0">Already have an account? <a href="{{ url_for('login') }}" class="fw-semibold text-decoration-none" style="color: #2196A3;">Login</a></p>
        </div>
    </div>

</body>
</html>
