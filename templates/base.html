<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudentOS{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div id="app-layout">
        <aside id="main-sidebar">
            <a href="#" class="sidebar-brand">
                <i class="bi bi-mortarboard-fill"></i>
                <span>StudentOS</span>
            </a>
            
            <div class="sidebar-menu-list">
                <a href="#" class="sidebar-link active">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-book"></i> Assignments
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-check-circle"></i> Attendance
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-calendar3"></i> Timetable
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-journal-text"></i> Notes
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-calendar-range"></i> Study Planner
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-bullseye"></i> Semester Goals
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-calculator"></i> GPA Calculator
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-link-45deg"></i> Important Links
                </a>
                <a href="#" class="sidebar-link">
                    <i class="bi bi-person-gear"></i> Profile
                </a>
            </div>
        </aside>

        <div id="content-space-wrapper">
            <header class="top-navbar-premium">
                <div class="premium-search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" placeholder="Search anything....">
                </div>
                
                <div class="d-flex align-items-center gap-3">
                    <div class="position-relative p-1 text-secondary" style="cursor: pointer;">
                        <i class="bi bi-bell fs-5"></i>
                        <span class="position-absolute top-1 start-75 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
                    </div>
                    
                    <div class="d-flex align-items-center gap-2 border-start ps-3">
                        <div class="rounded-circle d-flex align-items-center justify-content-center text-white" style="width:34px; height:34px; background-color: var(--brand-teal); font-weight:700; font-size:0.8rem;">
                            KS
                        </div>
                        <span class="fw-semibold text-dark fs-6 d-none d-sm-inline">Khushi</span>
                        <i class="bi bi-chevron-down text-muted small"></i>
                    </div>
                </div>
            </header>

            <main class="scrollable-content-area">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
