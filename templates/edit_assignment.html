<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Assignment - StudentOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <style>
        body, html {
            background-color: #F6F8FB;
            height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; margin: 0; padding: 0; overflow: hidden;
        }
        .auth-card { background: #ffffff; border: 1px solid #E7EDF3; border-radius: 20px; padding: 32px 40px; width: 100%; max-width: 460px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); }
        .btn-teal { background-color: #2196A3; color: white; border: none; border-radius: 10px; font-weight: 600; }
        .btn-teal:hover { background-color: #1A7F8B; color: white; }
        .form-label { font-weight: 600; color: #1F2937; font-size: 0.85rem; margin-bottom: 4px; }
        .form-control, .form-select { border: 1px solid #D1D5DB; border-radius: 10px; padding: 9px 14px; font-size: 0.95rem; color: #1F2937; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="text-center mb-3">
            <h3 class="fw-bold text-dark mb-1" style="font-size: 1.45rem;">Modify Task Parameters</h3>
            <p class="text-muted small">Update your parameters for this assignment entry element.</p>
        </div>

        <form action="{{ url_for('update_assignment', id=assignment.id) }}" method="POST">
            <div class="mb-2.5">
                <label class="form-label">Assignment Title</label>
                <input type="text" name="title" class="form-control" value="{{ assignment.title }}" required>
            </div>

            <div class="mb-2.5">
                <label class="form-label">Subject / Course</label>
                <input type="text" name="subject" class="form-control" value="{{ assignment.subject }}" required>
            </div>

            <div class="mb-2.5">
                <label class="form-label">Due Date</label>
                <input type="date" name="due_date" class="form-control" value="{{ assignment.due_date.strftime('%Y-%m-%d') }}" required>
            </div>

            <div class="row g-2 mb-3.5">
                <div class="col-6">
                    <label class="form-label">Priority</label>
                    <select name="priority" class="form-select" required>
                        <option value="High" {% if assignment.priority == 'High' %}selected{% endif %}>High</option>
                        <option value="Medium" {% if assignment.priority == 'Medium' %}selected{% endif %}>Medium</option>
                        <option value="Low" {% if assignment.priority == 'Low' %}selected{% endif %}>Low</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label">Status</label>
                    <select name="status" class="form-select" required>
                        <option value="Pending" {% if assignment.status == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="Completed" {% if assignment.status == 'Completed' %}selected{% endif %}>Completed</option>
                    </select>
                </div>
            </div>

            <div class="d-flex gap-2">
                <a href="{{ url_for('assignments') }}" class="btn btn-light w-50 border" style="border-radius: 10px; font-weight: 600;">Cancel</a>
                <button type="submit" class="btn btn-teal w-50 py-2.5">Update Changes</button>
            </div>
        </form>
    </div>

</body>
</html>
