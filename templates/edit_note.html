{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center"
     style="min-height:80vh; background-color:#F6F8FB;">

    <div class="auth-card">

        <div class="text-center mb-4">

            <h3 class="fw-bold text-dark mb-1">
                Edit Note
            </h3>

            <p class="text-muted small">
                Update your note.
            </p>

        </div>

        <form action="{{ url_for('update_note', id=note.id) }}" method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Note Title
                </label>

                <input
                    type="text"
                    name="title"
                    class="form-control"
                    value="{{ note.title }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Content
                </label>

                <textarea
                    name="content"
                    class="form-control"
                    rows="6">{{ note.content }}</textarea>

            </div>

            <div class="d-flex gap-2 mt-4">

                <a href="{{ url_for('notes') }}"
                   class="btn btn-light w-50 border"
                   style="border-radius:10px; font-weight:600;">

                    Cancel

                </a>

                <button
                    type="submit"
                    class="btn btn-teal w-50">

                    Update Note

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
